version: "3.1"
 
services: 
  gui: 
    build: ./gui
    ports:
      - 3001:80
    depends_on:
      - api
    volumes:
    - ./gui:/app
    - /app/node_modules
  api:
    image: api
    build: ./api
    working_dir: /var/www/
    volumes:
      - ./api:/var/www/
      - ./api/public/:/var/www/html/
    ports:
      - 8000:80
    depends_on:
      - db
  db:
    image: postgres:12
    env_file: .env
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
    ports:
      - 5622:5432
